<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chat Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="chat-page">
      <section class="chat-shell" aria-label="AI 实时聊天">
        <header class="chat-header">
          <div>
            <h1>AI 实时聊天</h1>
            <p>后端使用 OpenAI 兼容接口，支持流式输出。</p>
          </div>
          <span class="status-pill">Online</span>
        </header>

        <div class="chat-list" id="chat-list">
          <div class="chat-row assistant">
            <div class="chat-bubble">你好，我在这里。直接输入问题就可以开始聊天。</div>
          </div>
        </div>

        <footer class="chat-inputbar">
          <input
            class="chat-input"
            id="chat-input"
            placeholder="输入内容，按回车发送"
            autocomplete="off"
            aria-label="聊天输入"
          />
          <button class="chat-send" id="chat-send">发送</button>
        </footer>
      </section>
    </main>

    <script src="/main.js"></script>
  </body>
</html>
